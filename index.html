<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/fretboard.css">
    <link rel="icon" href="./images/favicon.ico" type="image/x-icon">
    <title>Guitar Trainer</title>
</head>
<body>
    <header class="app-header">
        <h1>Kam's Interactive Fretboard</h1>
    </header>
    <div class="fretboard"></div>
    <div class="note-name-section"></div>
    <div class="controls-panel">
        <div class="control-card">
            <span class="card-title">Settings</span>
            <div class="card-body row">
                <div class="control-group">
                    <label for="instrument-selector">Instrument</label>
                    <select name="instrument-selector" id="instrument-selector"></select>
                </div>
                <div class="control-group">
                    <label for="number-of-frets">Frets</label>
                    <input type="number" id="number-of-frets" value="21" min="5" max="30">
                </div>
                <div class="control-group">
                    <label>Accidentals</label>
                    <div class="btn-group">
                        <div class="mode-btn acc-select active" data-value="sharps">♯</div>
                        <div class="mode-btn acc-select" data-value="flats">♭</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="control-card">
            <span class="card-title">Display Mode</span>
            <div class="btn-group">
                <div class="mode-btn display-mode-btn active" data-value="free">Free</div>
                <div class="mode-btn display-mode-btn" data-value="scales">Scales</div>
                <div class="mode-btn display-mode-btn" data-value="triads">Triads</div>
                <div class="mode-btn display-mode-btn" data-value="intervals">Intervals</div>
            </div>
            <div id="note-display-card">
                <span class="card-title">Note Display</span>
                <div class="btn-group" style="margin-top: 8px">
                    <div class="mode-btn note-display-btn active" data-value="single">Single</div>
                    <div class="mode-btn note-display-btn" data-value="multiple">Multiple</div>
                    <div class="mode-btn note-display-btn" data-value="all">All</div>
                </div>
            </div>
            <div id="scale-options-card" style="display: none">
                <span class="card-title">Scale</span>
                <div class="card-body row" style="margin-top: 8px">
                    <div class="control-group">
                        <label for="scale-key">Root</label>
                        <select name="scale-key" id="scale-key"></select>
                    </div>
                    <div class="control-group">
                        <label for="scale-mode">Mode</label>
                        <select name="scale-mode" id="scale-mode"></select>
                    </div>
                </div>
            </div>
            <div id="triad-options-card" style="display: none">
                <span class="card-title">Triad</span>
                <div class="card-body row" style="margin-top: 8px">
                    <div class="control-group">
                        <label for="triad-key">Root</label>
                        <select name="triad-key" id="triad-key"></select>
                    </div>
                    <div class="control-group">
                        <label for="triad-type">Type</label>
                        <select name="triad-type" id="triad-type"></select>
                    </div>
                </div>
            </div>
            <div id="interval-options-card" style="display: none">
                <span class="card-title">Interval</span>
                <div class="card-body row" style="margin-top: 8px">
                    <div class="control-group">
                        <label for="interval-key">Root</label>
                        <select name="interval-key" id="interval-key"></select>
                    </div>
                    <div class="control-group">
                        <label for="interval-type">Interval</label>
                        <select name="interval-type" id="interval-type"></select>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script type="module" src="js/app.js"></script>
</body>
</html>
